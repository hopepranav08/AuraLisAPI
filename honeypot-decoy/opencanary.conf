{
    "device.node_id": "auralis-honeypot-001",

    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
                "console": {
                    "class": "logging.StreamHandler",
                    "stream": "ext://sys.stdout"
                }
            }
        }
    },

    "git.enabled": false,
    "ftp.enabled": false,
    "httpproxy.enabled": false,
    "mssql.enabled": false,
    "mysql.enabled": false,
    "smb.enabled": false,
    "rdp.enabled": false,
    "redis.enabled": false,
    "tcpbanner.enabled": false,
    "telnet.enabled": false,
    "vnc.enabled": false,

    "http.enabled": true,
    "http.port": 8081,
    "http.banner": "Apache/2.2.22 (Ubuntu)",
    "http.skin": "nasLogin",

    "ssh.enabled": true,
    "ssh.port": 2222,
    "ssh.version": "SSH-2.0-OpenSSH_5.1p1 Debian-4"
}
